<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CourseMate - Dashboard</title>
  <link rel="stylesheet" href="./css/style.css"/>
  <style>
    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open {
      display: flex;
    }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      position: relative;
    }
    .modal h2 {
      font-size: 20px;
      font-weight: 600;
      color: #202124;
      margin: 0 0 24px 0;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: transparent;
      color: #5f6368;
      font-size: 20px;
      padding: 4px 10px;
      border-radius: 6px;
    }
    .modal-close:hover {
      background: #f1f3f4;
      color: #202124;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    /* Create button */
    .create-btn-wrap {
      display: flex;
      justify-content: center;
      padding: 40px 0 32px;
    }
    .create-big-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      background: #1a73e8;
      color: #fff;
      box-shadow: 0 2px 8px rgba(26,115,232,0.25);
    }
    .create-big-btn:hover {
      background: #1557b0;
      box-shadow: 0 4px 14px rgba(26,115,232,0.35);
    }
    .create-big-btn .icon {
      font-size: 22px;
      line-height: 1;
    }

    /* Course grid */
    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .course-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 14px;
      padding: 20px;
      transition: box-shadow 0.15s;
    }
    .course-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }
    .course-card h3 {
      font-size: 16px;
      font-weight: 600;
      color: #202124;
      margin: 0 0 6px 0;
    }
    .course-card .desc {
      font-size: 14px;
      color: #5f6368;
      margin: 0 0 6px 0;
      min-height: 20px;
    }
    .course-card .meta {
      font-size: 12px;
      color: #9aa0a6;
      margin: 0 0 16px 0;
    }
    .course-card .card-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .course-card .card-btns button {
      font-size: 13px;
      padding: 7px 14px;
    }

    /* File upload area */
    .file-upload-area {
      border: 2px dashed #dadce0;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      color: #5f6368;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-top: 4px;
    }
    .file-upload-area:hover {
      border-color: #1a73e8;
      background: #f8f9ff;
    }
    .file-upload-area.has-file {
      border-color: #34a853;
      background: #e6f4ea;
      color: #137333;
    }
    .file-upload-area input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <a class="topbar-brand" href="./dashboard.html">CourseMate</a>
    <nav class="topbar-nav">
      <a href="./dashboard.html" class="active">Dashboard</a>
      <a href="#" id="logoutLink" class="btn-logout">Logout</a>
    </nav>
  </div>

  <div class="container">
    <div id="message"></div>

    <!-- Create Course Button -->
    <div class="create-btn-wrap">
      <button class="create-big-btn" id="openModalBtn">
        <span class="icon">+</span> Create New Course
      </button>
    </div>

    <!-- Course List -->
    <div class="card-title" style="margin-bottom:16px;">My Courses</div>
    <div id="courseList">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <!-- Create Course Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="closeModalBtn">✕</button>
      <h2>Create New Course</h2>

      <div class="form-group">
        <label for="courseName">Course Name *</label>
        <input id="courseName" type="text" placeholder="e.g. EE547 Linear Algebra" />
      </div>

      <div class="form-group">
        <label for="courseDescription">Description</label>
        <textarea id="courseDescription" placeholder="Brief description of this course..."></textarea>
      </div>

      <div class="form-group">
        <label>Upload PDF (optional)</label>
        <div class="file-upload-area" id="fileUploadArea">
          <input type="file" id="pdfFile" accept=".pdf" />
          <div id="fileLabel">📄 Click to select a PDF file</div>
        </div>
      </div>

      <div id="modalMessage"></div>

      <div class="modal-footer">
        <button class="ghost" id="cancelBtn">Cancel</button>
        <button id="createCourseBtn">Create Course</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { api, goToCourse, goToQA, goToQuiz } from "./js/api.js";

    const messageDiv     = document.getElementById("message");
    const modalMessage   = document.getElementById("modalMessage");
    const courseListDiv  = document.getElementById("courseList");
    const modalOverlay   = document.getElementById("modalOverlay");

    function ensureLogin() {
      if (!api.getToken()) window.location.href = "./index.html";
    }

    function showMessage(text, type = "info") {
      messageDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
      setTimeout(() => messageDiv.innerHTML = "", 3000);
    }

    function showModalMessage(text, type = "error") {
      modalMessage.innerHTML = `<div class="message ${type}">${text}</div>`;
    }

    // Modal open/close
    document.getElementById("openModalBtn").addEventListener("click", () => {
      modalOverlay.classList.add("open");
    });

    function closeModal() {
      modalOverlay.classList.remove("open");
      document.getElementById("courseName").value = "";
      document.getElementById("courseDescription").value = "";
      document.getElementById("pdfFile").value = "";
      document.getElementById("fileLabel").textContent = "📄 Click to select a PDF file";
      document.getElementById("fileUploadArea").classList.remove("has-file");
      modalMessage.innerHTML = "";
    }

    document.getElementById("closeModalBtn").addEventListener("click", closeModal);
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    // File upload area
    const fileUploadArea = document.getElementById("fileUploadArea");
    const pdfFileInput   = document.getElementById("pdfFile");

    fileUploadArea.addEventListener("click", () => pdfFileInput.click());

    pdfFileInput.addEventListener("change", () => {
      const file = pdfFileInput.files[0];
      if (file) {
        document.getElementById("fileLabel").textContent = `✅ ${file.name}`;
        fileUploadArea.classList.add("has-file");
      }
    });

    // Create course
    document.getElementById("createCourseBtn").addEventListener("click", async () => {
      const name        = document.getElementById("courseName").value.trim();
      const description = document.getElementById("courseDescription").value.trim();
      const file        = pdfFileInput.files[0];

      if (!name) {
        showModalMessage("Course name is required.", "error");
        return;
      }

      try {
        const course = await api.createCourse(name, description);

        if (file) {
          await api.uploadDocument(course.id, file, true);
          showMessage(`Course "${name}" created with PDF uploaded.`, "success");
        } else {
          showMessage(`Course "${name}" created successfully.`, "success");
        }

        closeModal();
        await loadCourses();
      } catch (err) {
        showModalMessage(err.message, "error");
      }
    });

    // Render courses
    function renderCourses(courses) {
      if (!Array.isArray(courses) || courses.length === 0) {
        courseListDiv.innerHTML = `<div class="empty-state">No courses yet. Create your first course!</div>`;
        return;
      }

      courseListDiv.innerHTML = `<div class="course-grid">${
        courses.map(course => `
          <div class="course-card" data-id="${course.id}" style="cursor:pointer;">
            <h3>${course.name}</h3>
            <p class="desc">${course.description || ""}</p>
            <p class="meta">Created ${new Date(course.created_at).toLocaleDateString()}</p>
            <div class="card-btns">
              <button class="danger delete-course" data-id="${course.id}">Delete</button>
            </div>
          </div>
        `).join("")
      }</div>`;

      document.querySelectorAll(".course-card").forEach(card =>
        card.addEventListener("click", (e) => {
          if (e.target.closest("button")) return;
          goToCourse(card.dataset.id);
        }));

      document.querySelectorAll(".delete-course").forEach(btn =>
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          if (!confirm("Delete this course?")) return;
          try {
            await api.deleteCourse(btn.dataset.id);
            showMessage("Course deleted.", "success");
            await loadCourses();
          } catch (err) {
            showMessage(err.message, "error");
          }
        }));
    }

    async function loadCourses() {
      try {
        const data = await api.getCourses();
        renderCourses(data);
      } catch (err) {
        courseListDiv.innerHTML = `<div class="message error">${err.message}</div>`;
      }
    }

    document.getElementById("logoutLink").addEventListener("click", (e) => {
      e.preventDefault();
      api.clearToken();
      window.location.href = "./index.html";
    });

    ensureLogin();
    loadCourses();
  </script>
</body>
</html>
