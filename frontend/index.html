<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CourseMate</title>
  <link rel="stylesheet" href="./css/style.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 16px;
    }

    .auth-brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-brand h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a73e8;
      margin: 0 0 4px 0;
      letter-spacing: -0.5px;
    }

    .auth-brand p {
      color: #5f6368;
      font-size: 14px;
      margin: 0;
    }

    .auth-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 36px 36px 32px;
    }

    .tab-switch {
      display: flex;
      background: #f1f3f4;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #5f6368;
      cursor: pointer;
      transition: all 0.2s;
      margin: 0;
      width: auto;
    }

    .tab-btn.active {
      background: #fff;
      color: #1a73e8;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .auth-form h2 {
      font-size: 20px;
      font-weight: 600;
      color: #202124;
      margin: 0 0 20px 0;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #3c4043;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #dadce0;
      border-radius: 8px;
      font-size: 15px;
      color: #202124;
      background: #fff;
      transition: border-color 0.2s;
      margin: 0;
    }

    .form-group input:focus {
      outline: none;
      border-color: #1a73e8;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .submit-btn:hover { background: #1557b0; }

    .auth-message {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .auth-message.show { display: block; }
    .auth-message.success { background: #e6f4ea; color: #137333; }
    .auth-message.error { background: #fce8e6; color: #c5221f; }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-brand">
      <h1>CourseMate</h1>
      <p>Your AI-powered course assistant</p>
    </div>

    <div class="auth-card">
      <div class="tab-switch">
        <button class="tab-btn active" id="loginTab">Sign in</button>
        <button class="tab-btn" id="registerTab">Create account</button>
      </div>

      <!-- Login Form -->
      <div class="auth-form active" id="loginForm">
        <h2>Welcome back</h2>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="••••••••" />
        </div>
        <button class="submit-btn" id="loginBtn">Sign in</button>
        <div class="auth-message" id="loginMessage"></div>
      </div>

      <!-- Register Form -->
      <div class="auth-form" id="registerForm">
        <h2>Create your account</h2>
        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input id="registerEmail" type="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input id="registerPassword" type="password" placeholder="••••••••" />
        </div>
        <button class="submit-btn" id="registerBtn">Create account</button>
        <div class="auth-message" id="registerMessage"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { api } from "./js/api.js";

    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    loginTab.addEventListener("click", () => {
      loginTab.classList.add("active");
      registerTab.classList.remove("active");
      loginForm.classList.add("active");
      registerForm.classList.remove("active");
    });

    registerTab.addEventListener("click", () => {
      registerTab.classList.add("active");
      loginTab.classList.remove("active");
      registerForm.classList.add("active");
      loginForm.classList.remove("active");
    });

    function showMessage(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `auth-message show ${type}`;
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();
      if (!email || !password) {
        showMessage("loginMessage", "Please enter email and password.", "error");
        return;
      }
      try {
        const result = await api.login(email, password);
        api.setToken(result.access_token);
        showMessage("loginMessage", "Sign in successful. Redirecting...", "success");
        setTimeout(() => window.location.href = "./dashboard.html", 600);
      } catch (err) {
        showMessage("loginMessage", err.message, "error");
      }
    });

    document.getElementById("registerBtn").addEventListener("click", async () => {
      const email = document.getElementById("registerEmail").value.trim();
      const password = document.getElementById("registerPassword").value.trim();
      if (!email || !password) {
        showMessage("registerMessage", "Please enter email and password.", "error");
        return;
      }
      try {
        const result = await api.register(email, password);
        api.setToken(result.access_token);
        showMessage("registerMessage", "Account created. Redirecting...", "success");
        setTimeout(() => window.location.href = "./dashboard.html", 600);
      } catch (err) {
        showMessage("registerMessage", err.message, "error");
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      if (loginForm.classList.contains("active")) {
        document.getElementById("loginBtn").click();
      } else {
        document.getElementById("registerBtn").click();
      }
    });
  </script>
</body>
</html>
